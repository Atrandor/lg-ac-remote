name: Keystore erzeugen (einmalig)
on: workflow_dispatch
jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Keystore erzeugen und als Base64 ausgeben
        run: |
          keytool -genkeypair -v -keystore ks.jks -alias lgac \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "AC-Remote-2026!" -keypass "AC-Remote-2026!" \
            -dname "CN=LgAcRemote"
          echo "===== KEYSTORE_BASE64 (alles zwischen den Linien kopieren) ====="
          base64 -w0 ks.jks
          echo ""
          echo "================================================================"
